<!DOCTYPE html>
<html>

<head>
<title>Atlas Loader</title>

<!-- JetBrains Mono -->
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>

/* FORCE FONT FOR EVERYTHING */
* {
  font-family: 'JetBrains Mono', monospace !important;
}

body {
  margin: 0;
  background: #0d0d0d;
  color: white;
  display: flex;
  justify-content: center;
  padding: 40px;
}

/* main container */
.container {
  width: 700px;
}

/* header */
.header {
  background: #0f0f0f;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  margin-bottom: 20px;
}

.header h1 {
  margin: 0;
  font-size: 32px;
}

.header p {
  margin: 6px 0 0 0;
  opacity: 0.7;
}

/* sections */
.section {
  background: #0f0f0f;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  margin-bottom: 20px;
}

.section h2 {
  margin-top: 0;
}

/* buttons */
button {
  background: #0a0a0a;
  color: white;
  border: none;
  padding: 10px 14px;
  margin: 5px 5px 5px 0;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #0f0f0f;
}

/* input */
input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  width: 60%;
  margin-right: 10px;
  background: #0a0a0a;
  color: white;
}

/* light mode */
.light {
  background: #f2f2f2;
  color: black;
}

.light .header,
.light .section {
  background: white;
  color: black;
}

.light button {
  background: #e0e0e0;
  color: black;
}

.light button:hover {
  background: #d0d0d0;
}

.light input {
  background: #f0f0f0;
  color: black;
}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <h1>Atlas Loader</h1>
  <p>game and website loader</p>
</div>

<!-- GAMES -->
<div class="section">
<h2>Games</h2>

<button onclick="window.open('https://d1tm91r4ytbt54.cloudfront.net/2779cbcb-a02f-48a3-9e2e-95a8d123d165/1685483461665/web/index.html','_blank')">minecraft</button>
<button onclick="downloadShortcut('minecraft','https://d1tm91r4ytbt54.cloudfront.net/...')">download page</button>
<br>

<button onclick="window.open('https://slopenexus.github.io/games/19-04v2.1/index.html','_blank')">fixed slope</button>
<button onclick="downloadShortcut('slope','https://slopenexus.github.io/games/19-04v2.1/index.html')">download page</button>
<br>

<button onclick="window.open('https://scratch.mit.edu/projects/818748698/fullscreen/','_blank')">starship</button>
<button onclick="downloadShortcut('starship','https://scratch.mit.edu/projects/818748698/fullscreen/')">download page</button>
<br>

<button onclick="window.open('https://sites.google.com/view/drive-u-7-home/new-games/level-67?authuser=0','_blank')">geometry dash wave</button>
<button onclick="downloadShortcut('geometry dash','https://sites.google.com/view/drive-u-7-home/new-games/level-67?authuser=0')">download page</button>
<br>

<button onclick="window.open('https://sites.google.com/view/drive-u-7-home/renny?authuser=0','_blank')">granny</button>
<button onclick="downloadShortcut('granny','https://sites.google.com/view/drive-u-7-home/renny?authuser=0')">download page</button>
<br>

<button onclick="window.open('https://sites.google.com/view/drive-u-7-home/gta?authuser=0','_blank')">gta 7</button>
<button onclick="downloadShortcut('gta','https://sites.google.com/view/drive-u-7-home/gta?authuser=0')">download page</button>
<br>

<button onclick="window.open('https://sites.google.com/view/drive-u-7-home/home','_blank')">full game library</button>

</div>

<!-- LOADER -->
<div class="section">
<h2>Website Loader</h2>

<input id="urlInput" type="text" placeholder="enter link here">
<button onclick="loadLink()">load</button>

</div>

<!-- SETTINGS -->
<div class="section">
<h2>Settings</h2>

<button onclick="toggleTheme()">light mode</button>
<button onclick="setNewTabTitle()">hide tab title</button>

</div>

</div>

<script>

// loader
function loadLink() {
  let url = document.getElementById("urlInput").value;

  if (!url.startsWith("http")) {
    url = "https://" + url;
  }

  window.open(url, "_blank", "noopener,noreferrer");
}

// shortcut downloader
function downloadShortcut(name, url) {
  const fileContent = `
<!DOCTYPE html>
<html>
<head>
<meta http-equiv="refresh" content="0; url=${url}">
<title>${name}</title>
</head>
<body>
If not redirected, <a href="${url}">click here</a>.
</body>
</html>
`;

  const blob = new Blob([fileContent], {type:"text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name + ".html";
  a.click();
}

// theme toggle
function toggleTheme() {
  document.body.classList.toggle("light");
}

// NEW: change tab title
function setNewTabTitle() {
  document.title = "New Tab";
}

</script>

</body>

</html>
