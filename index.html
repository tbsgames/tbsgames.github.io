<h2>loader</h2>

<input id="urlInput" type="text" placeholder="enter link here" style="width:300px;">
<button onclick="loadLink()">load</button>

<script>
function loadLink() {
  let url = document.getElementById("urlInput").value;

  if (!url.startsWith("http")) {
    url = "https://" + url;
  }

  window.open(url, "_blank", "noopener,noreferrer");
}

// creates downloadable HTML shortcut file
function downloadShortcut(name, url) {
  const fileContent = `
<!DOCTYPE html>
<html>
<head>
<meta http-equiv="refresh" content="0; url=${url}">
<title>${name}</title>
</head>
<body>
If not redirected, <a href="${url}">click here</a>.
</body>
</html>
`;

  const blob = new Blob([fileContent], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name + ".html";
  a.click();
}
</script>
